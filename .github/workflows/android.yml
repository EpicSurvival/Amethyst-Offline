name: Android CI

on:
  pull_request:
    branches-ignore:
      - 'l10n_v3_openjdk' 
    types: [ opened, reopened ]
  push:
    branches-ignore:
      - 'l10n_v3_openjdk'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      GPLAY_KEYSTORE_PASSWORD: ${{ secrets.GPLAY_KEYSTORE_PASSWORD }}
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Remove submodule tags
        run: |
          cd Amethyst-Android
          git tag -d $(git tag) || true

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Get JRE 8
        uses: dawidd6/action-download-artifact@v21
        with:
          workflow: build.yml
          path: app_pojavlauncher/src/main/assets/components/jre
          workflow_conclusion: completed
          repo: AngelAuraMC/angelauramc-openjdk-build
          branch: buildjre8
          name: jre8-pojav

      # - name: Get JRE17
      #   uses: dawidd6/action-download-artifact@v21
      #   with:
      #     workflow: build.yml
      #     path: app_pojavlauncher/src/main/assets/components/jre-new
      #     workflow_conclusion: completed
      #     repo: AngelAuraMC/angelauramc-openjdk-build
      #     branch: buildjre17-21
      #     name: jre17-pojav
      #
      # - name: Get JRE21
      #   uses: dawidd6/action-download-artifact@v21
      #   with:
      #     workflow: build.yml
      #     path: app_pojavlauncher/src/main/assets/components/jre-21
      #     workflow_conclusion: completed
      #     repo: AngelAuraMC/angelauramc-openjdk-build
      #     branch: buildjre17-21
      #     name: jre21-pojav
      #
      # - name: Get JRE25
      #   uses: dawidd6/action-download-artifact@v21
      #   with:
      #     workflow: build.yml
      #     path: app_pojavlauncher/src/main/assets/components/jre-25
      #     workflow_conclusion: completed
      #     repo: FCL-Team/Android-OpenJDK-Build
      #     branch: Build_JRE_25
      #     name: jre25-multiarch

      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
          validate-wrappers: false
          gradle-version: "8.11"

      - name: Run scripts
        run: |
          cd Amethyst-Android
          ./scripts/languagelist_updater.sh
          mkdir out

      - name: Patch files
        run: |
          cp android.jks ./Amethyst-Android/app_pojavlauncher/aamc_upload.jks
          patch ./Amethyst-Android/app_pojavlauncher/src/main/java/net/kdt/pojavlaunch/tasks/MinecraftDownloader.java MinecraftDownloader.patch
          patch ./Amethyst-Android/app_pojavlauncher/src/main/java/net/kdt/pojavlaunch/Tools.java Tools.patch

      - name: Build Release .apk
        run: |
          cd Amethyst-Android
          # Build the launcher
          gradle :app_pojavlauncher:assembleRelease
          mv app_pojavlauncher/build/outputs/apk/release/app_pojavlauncher-release.apk out/app-release.apk

      - name: Gen md5sums
        run: |
          cd Amethyst-Android
          md5sum out/app-release.apk > out/app-release.md5

      - name: Build Debug .apk
        run: |
          cd Amethyst-Android
          # Build the launcher
          gradle :app_pojavlauncher:assembleDebug
          mv app_pojavlauncher/build/outputs/apk/debug/app_pojavlauncher-debug.apk out/app-debug.apk

      - name: Gen md5sums
        run: |
          cd Amethyst-Android
          md5sum out/app-debug.apk > out/app-debug.md5

      - name: Upload debug APK
        uses: actions/upload-artifact@v6
        with:
          name: app-debug (recommended)
          path: Amethyst-Android/out/app-debug.*

      - name: Upload release APK
        uses: actions/upload-artifact@v6
        with:
          name: app-release
          path: Amethyst-Android/out/app-release.*